# ============================================================
# application.properties – SafeTrail Spring Boot Config
# ============================================================

# App
spring.application.name=SafeTrail
server.port=8080

# ── MySQL Database ──
spring.datasource.url=jdbc:mysql://localhost:3306/safetrail_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── JWT ──
jwt.secret=SafeTrail_JWT_Secret_Key_2024_MinLength32Chars!!

# ── Twilio SMS ──
twilio.account.sid=YOUR_TWILIO_ACCOUNT_SID
twilio.auth.token=YOUR_TWILIO_AUTH_TOKEN
twilio.phone.number=+1XXXXXXXXXX

# ── Email (Gmail SMTP) ──
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_GMAIL@gmail.com
spring.mail.password=YOUR_APP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Admin Contacts ──
admin.email=admin@safetrail.com
emergency.phone=+91XXXXXXXXXX

# ── Logging ──
logging.level.com.safetrail=DEBUG
logging.level.org.springframework.security=INFO
