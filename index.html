<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tourist Safety Monitoring System</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<header class="header">
  <h1>Tourist Safety Monitoring System</h1>
  <p>Real-Time Safety Support for Travelers</p>
</header>

<main class="container">

  <section class="card">
    <h2>Tourist Registration</h2>

    <form id="touristForm">

      <div class="form-group">
        <label>Name</label>
        <input type="text" id="name" required />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required />
      </div>

      <div class="form-group">
        <label>Current Location</label>
        <input type="text" id="location" required />
      </div>

      <button type="submit" class="btn-primary">
        Register Tourist
      </button>

    </form>

  </section>

  <section class="card">

    <h2>Emergency Alert</h2>

    <button onclick="sendAlert()" class="btn-danger">
      Send Emergency Alert
    </button>

    <p id="message"></p>

  </section>

</main>

<footer class="footer">
  <p>© 2026 Tourist Safety Monitoring System</p>
</footer>

<script src="script.js"></script>

</body>
</html>
