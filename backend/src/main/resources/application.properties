# =============================================
# TSMS - Tourist Safety Management System
# application.properties
# =============================================

# Server Port
server.port=8080

# =============================================
# MySQL Database Configuration
# Change username/password to match your MySQL
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/tsms_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# =============================================
# App Name
# =============================================
spring.application.name=tourist-safety-management-system
